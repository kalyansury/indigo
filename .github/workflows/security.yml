name: Security

"on":
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    schedule:
        - cron: "17 4 * * 1"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    govulncheck:
        name: Govulncheck
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run govulncheck
              uses: golang/govulncheck-action@v1
              with:
                  go-version-file: go.mod
                  go-package: ./...
